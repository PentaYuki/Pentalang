version: '3.8'

services:
  app:
    build: .
    container_name: kotoba-designer
    environment:
      - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/app
      - ./data:/app/data
      - ./voice:/app/voice
      - ./models:/app/models
    network_mode: "host"
    privileged: true
    restart: unless-stopped
